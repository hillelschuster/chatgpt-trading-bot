name: crossvenue-health

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: crossvenue-health
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest -v test_crossvenue_health.py
      - run: python -m py_compile crossvenue_health.py test_crossvenue_health.py
      - name: Download latest prospective artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=crossvenue-series&per_page=100" \
            --jq '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | last | .id // empty')
          test -n "$artifact_id" || { echo "crossvenue-series artifact missing"; exit 1; }
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > /tmp/series.zip
          unzip -o /tmp/series.zip -d .
      - name: Summarize evidence health
        run: python crossvenue_health.py --out reports/crossvenue_health.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crossvenue-health-${{ github.run_id }}
          path: reports/crossvenue_health.json
          retention-days: 30
          if-no-files-found: error
