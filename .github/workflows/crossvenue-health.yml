name: crossvenue-health

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: crossvenue-health
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: >-
          python -m unittest -v test_crossvenue_health.py
          test_crossvenue_snapshot_health.py test_crossvenue_snapshot_binding.py
          test_crossvenue_artifact.py test_crossvenue_actions_health.py
          test_crossvenue_scheduler_health.py test_crossvenue_actions_binding.py
          test_crossvenue_actions_gate.py
      - run: >-
          python -m py_compile crossvenue_health.py test_crossvenue_health.py
          crossvenue_snapshot_health.py test_crossvenue_snapshot_health.py
          crossvenue_snapshot_binding.py test_crossvenue_snapshot_binding.py
          crossvenue_artifact.py test_crossvenue_artifact.py
          crossvenue_actions_health.py test_crossvenue_actions_health.py
          crossvenue_scheduler_health.py test_crossvenue_scheduler_health.py
          crossvenue_actions_binding.py test_crossvenue_actions_binding.py
          crossvenue_actions_gate.py test_crossvenue_actions_gate.py
      - name: Download latest approved successful prospective artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p reports
          python crossvenue_artifact.py --repository "$GITHUB_REPOSITORY" \
            --artifact-name crossvenue-series --branch main \
            --workflow-path .github/workflows/crossvenue-probe.yml \
            --out /tmp/series.zip --required | tee reports/crossvenue_restoration.json
          unzip -o /tmp/series.zip -d .
      - name: Audit recent snapshot payload and timestamp integrity
        run: >-
          python crossvenue_snapshot_health.py
          --snapshots data/crossvenue_snapshots.jsonl
          --out reports/crossvenue_snapshot_health.json
      - name: Bind snapshot audit to exact restored evidence
        run: >-
          python crossvenue_snapshot_binding.py
          --snapshots data/crossvenue_snapshots.jsonl
          --snapshot-report reports/crossvenue_snapshot_health.json
          --out reports/crossvenue_snapshot_binding.json
      - name: Fetch collector runs once for reproducible operational audit
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh api "repos/$GITHUB_REPOSITORY/actions/workflows/crossvenue-probe.yml/runs?branch=main&per_page=100"
          > reports/crossvenue_workflow_runs.json
      - name: Audit collector workflow execution health from saved runs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from crossvenue_actions_health import summarize

          runs_payload = json.loads(Path("reports/crossvenue_workflow_runs.json").read_text())
          runs = runs_payload.get("workflow_runs") or []
          restoration = json.loads(Path("reports/crossvenue_restoration.json").read_text())
          report = summarize(runs, restoration)
          Path("reports/crossvenue_actions_health.json").write_text(
              json.dumps(report, indent=2, allow_nan=False) + "\n"
          )
          print(json.dumps(report, indent=2, allow_nan=False))
          if report["status"] == "INVALID":
              raise SystemExit(1)
          PY
      - name: Replace mixed-event cadence with schedule-only audit
        run: >-
          python crossvenue_scheduler_health.py
          --runs reports/crossvenue_workflow_runs.json
          --actions-report reports/crossvenue_actions_health.json
          --out reports/crossvenue_actions_health.json
      - name: Bind Actions audit to exact saved inputs
        run: >-
          python crossvenue_actions_binding.py
          --runs reports/crossvenue_workflow_runs.json
          --restoration reports/crossvenue_restoration.json
          --actions-report reports/crossvenue_actions_health.json
          --out reports/crossvenue_actions_binding.json
      - name: Summarize and bind authoritative evidence health
        run: |
          python crossvenue_health.py --out reports/crossvenue_health.json
          python crossvenue_actions_gate.py \
            --health-report reports/crossvenue_health.json \
            --binding reports/crossvenue_actions_binding.json \
            --runs reports/crossvenue_workflow_runs.json \
            --restoration reports/crossvenue_restoration.json \
            --actions-report reports/crossvenue_actions_health.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crossvenue-health-${{ github.run_id }}
          path: |
            reports/crossvenue_restoration.json
            reports/crossvenue_workflow_runs.json
            reports/crossvenue_snapshot_health.json
            reports/crossvenue_snapshot_binding.json
            reports/crossvenue_actions_health.json
            reports/crossvenue_actions_binding.json
            reports/crossvenue_health.json
          retention-days: 30
          if-no-files-found: error
