name: crossvenue-series

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  pull_request:
    branches: [main]
    paths:
      - ".crossvenue-trigger"
      - "crossvenue_snapshot.py"
      - "crossvenue_events.py"
      - "crossvenue_settlements.py"
      - "crossvenue_chain.py"
      - "crossvenue_pnl.py"
      - "crossvenue_freeze.py"
      - "crossvenue_validate.py"
      - "test_crossvenue_snapshot.py"
      - "test_crossvenue_events.py"
      - "test_crossvenue_settlements.py"
      - "test_crossvenue_chain.py"
      - "test_crossvenue_pnl.py"
      - "test_crossvenue_freeze.py"
      - "test_crossvenue_validate.py"
      - "CROSS_VENUE_EXPERIMENT.md"
      - ".github/workflows/crossvenue-probe.yml"

concurrency:
  group: crossvenue-series
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: >-
          python -m unittest -v test_crossvenue_snapshot.py
          test_crossvenue_events.py test_crossvenue_settlements.py
          test_crossvenue_chain.py test_crossvenue_pnl.py
          test_crossvenue_freeze.py test_crossvenue_validate.py
      - run: >-
          python -m py_compile crossvenue_snapshot.py crossvenue_events.py
          crossvenue_settlements.py crossvenue_chain.py crossvenue_pnl.py
          crossvenue_freeze.py crossvenue_validate.py
          test_crossvenue_snapshot.py test_crossvenue_events.py
          test_crossvenue_settlements.py test_crossvenue_chain.py
          test_crossvenue_pnl.py test_crossvenue_freeze.py
          test_crossvenue_validate.py
      - name: Restore latest prospective series
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          artifact_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=crossvenue-series&per_page=100" \
            --jq '.artifacts | map(select(.expired == false)) | sort_by(.created_at) | last | .id // empty')
          if [ -n "$artifact_id" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > /tmp/previous.zip
            unzip -o /tmp/previous.zip -d .
          fi
      - name: Freeze or verify the prospective experiment contract
        run: >-
          python crossvenue_freeze.py
          --manifest data/crossvenue_experiment_freeze.json
          --evidence data/crossvenue_pnl_events.jsonl
          --report reports/crossvenue_freeze.json
      - name: Capture restored baseline
        run: |
          mkdir -p /tmp/crossvenue-prior
          for file in crossvenue_snapshots.jsonl crossvenue_events.jsonl crossvenue_settled_events.jsonl; do
            if [ -f "data/$file" ]; then cp "data/$file" "/tmp/crossvenue-prior/$file"; fi
          done
      - name: Collect and audit one BTC/ETH cadence slot
        run: |
          mkdir -p data reports
          python crossvenue_snapshot.py --coins BTC,ETH --cadence-seconds 300 \
            --out data/crossvenue_snapshots.jsonl > reports/crossvenue_continuity.json
      - name: Build leakage-safe funding-event windows
        run: >-
          python crossvenue_events.py data/crossvenue_snapshots.jsonl
          --out data/crossvenue_events.jsonl
          --report reports/crossvenue_events.json
      - name: Resume exact public realized funding
        run: >-
          python crossvenue_settlements.py data/crossvenue_events.jsonl
          --existing data/crossvenue_settled_events.jsonl
          --out data/crossvenue_settled_events.jsonl
          --report reports/crossvenue_settlements.json
      - name: Compute frozen non-inferential two-leg P&L
        run: >-
          python crossvenue_pnl.py data/crossvenue_settled_events.jsonl
          --out data/crossvenue_pnl_events.jsonl
          --report reports/crossvenue_pnl.json
      - name: Run frozen prospective validation gate
        run: >-
          python crossvenue_validate.py data/crossvenue_pnl_events.jsonl
          --freeze-manifest data/crossvenue_experiment_freeze.json
          --report reports/crossvenue_validation.json
          --base-ledger data/crossvenue_validation_base_ledger.jsonl
          --stress-ledger data/crossvenue_validation_stress_ledger.jsonl
      - name: Verify append-only artifact chain
        run: |
          args=()
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then args+=(--require-previous); fi
          python crossvenue_chain.py \
            --previous-dir /tmp/crossvenue-prior --current-dir data \
            --report reports/crossvenue_chain.json "${args[@]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.event_name == 'pull_request' && format('crossvenue-probe-{0}', github.run_id) || 'crossvenue-series' }}
          path: |
            data/crossvenue_experiment_freeze.json
            data/crossvenue_snapshots.jsonl
            data/crossvenue_events.jsonl
            data/crossvenue_settled_events.jsonl
            data/crossvenue_pnl_events.jsonl
            data/crossvenue_validation_base_ledger.jsonl
            data/crossvenue_validation_stress_ledger.jsonl
            reports/crossvenue_freeze.json
            reports/crossvenue_continuity.json
            reports/crossvenue_events.json
            reports/crossvenue_settlements.json
            reports/crossvenue_pnl.json
            reports/crossvenue_validation.json
            reports/crossvenue_chain.json
          retention-days: 90
          if-no-files-found: warn
