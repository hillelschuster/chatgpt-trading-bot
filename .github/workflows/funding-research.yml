name: funding-research

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.py"
      - ".github/workflows/funding-research.yml"

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest -v
      - run: python bootstrap_history.py --coins BTC,ETH,SOL --days 180 --out data/history.jsonl
      - run: python research.py data/history.jsonl --out reports/funding_fade.json --min-trades 30
      - name: Commit reproducible result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add reports/funding_fade.json
          git diff --cached --quiet || git commit -m "research: refresh funding-fade evidence [skip ci]"
          git push
