name: research

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: research
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest -v
      - name: Build broad liquid-perp history panel
        run: >-
          python bootstrap_history.py --auto-coins 12 --min-day-volume 10000000
          --min-assets 6 --days 180 --request-delay 2.6
          --out data/history.jsonl --meta-out reports/universe.json
      - name: Evaluate funding fade
        run: >-
          python research.py data/history.jsonl --roundtrip-bps 12
          --out reports/funding_fade.json --trades-out reports/oos_trades.jsonl
          --ledger-out reports/portfolio_ledger.jsonl --min-trades 30
          --capital 10000 --max-positions 3 --risk-fraction 1
          --max-trade-notional 5000 --max-coin-positions 1
      - name: Run anchored walk-forward gate
        run: >-
          python walkforward.py data/history.jsonl --roundtrip-bps 12
          --out reports/walkforward.json --trades-out reports/walkforward_trades.jsonl
          --ledger-out reports/walkforward_ledger.jsonl --folds 4
          --min-trades 30 --capital 10000
      - name: Run cross-sectional benchmark
        run: >-
          python xsection.py data/history.jsonl --roundtrip-bps 12
          --out reports/xsection.json --trades-out reports/xsection_trades.jsonl
          --ledger-out reports/xsection_ledger.jsonl --min-trades 40
          --min-assets 6 --capital 10000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: research-${{ github.run_id }}
          path: |
            data/history.jsonl
            reports/
          retention-days: 14
          if-no-files-found: warn
